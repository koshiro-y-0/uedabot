name: 植田総裁Bot - 金曜週間サマリー

on:
  # 金曜 17:00 JST (= UTC 08:00)
  schedule:
    - cron: "0 8 * * 5"
  # 手動実行（テスト・デバッグ用）
  workflow_dispatch:

jobs:
  send-weekly-summary:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 週間サマリーを生成して送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/weekly_main.py

      - name: チャート画像をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.png
          git diff --cached --quiet || git commit -m "data: $(date +%Y-%m-%d) 週間チャート画像を保存"
          git push
