name: 植田総裁Bot - 金曜週間サマリー

on:
  # 金曜 17:00 JST (= UTC 08:00)
  schedule:
    - cron: "0 8 * * 5"
  # 手動実行（テスト・デバッグ用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-weekly-summary:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 週間サマリーを生成して送信
        id: weekly
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python src/weekly_main.py

      - name: チャート画像をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: $(date +%Y-%m-%d) 週間チャート画像を保存"
          git diff --cached --quiet && echo "コミット対象なし" || git push

      - name: チャート画像をLINEに送信（push後）
        if: steps.weekly.outputs.chart_path != ''
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from notify import send_line_image
          from tz import now_jst
          import os
          repo = os.getenv('GITHUB_REPOSITORY', 'koshiro-y-0/uedabot')
          filename = f'chart_weekly_{now_jst().strftime(\"%Y%m%d\")}.png'
          image_url = f'https://raw.githubusercontent.com/{repo}/main/data/{filename}'
          print(f'[INFO] 画像URL: {image_url}')
          send_line_image(image_url)
          "
